<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Configuración</title>
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
    }
    h3 {
      margin-top: 0;
      color: #F012BE;
    }
    textarea {
      width: 100%;
      height: 80px;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 8px;
      box-sizing: border-box;
      font-family: monospace;
      margin-bottom: 10px;
    }
    button {
      background-color: #F012BE;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }
    button:hover {
      background-color: #B10DC9;
    }
    .info {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h3>Focus Balls 🔴🔵</h3>
  <div class="info">Escribe los dominios a vigilar separados por coma (ej. tiktok.com, youtube.com):</div>
  <textarea id="sitesInput"></textarea>
  <button id="saveBtn">Guardar cambios</button>
  <script src="popup.js"></script>
</body>
</html>
